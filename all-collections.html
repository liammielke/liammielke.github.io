<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#0A0A0A', charcoal: '#141414', ash: '#2A2A2A',
            smoke: '#6B6B6B', bone: '#E8E0D5', ivory: '#F5F0E8',
            gold: '#C9A96E', 'gold-dim': '#8A6F3E',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"Courier Prime"', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background-color: #0A0A0A; color: #E8E0D5; font-family: 'DM Sans', sans-serif; font-weight: 300; margin: 0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 2px; }
    .nav-link { position: relative; letter-spacing: 0.18em; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: #C9A96E; transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
    .nav-link:hover::after { width: 100%; }
    .dropdown-menu { opacity: 0; pointer-events: none; transform: translateY(-8px); transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1); }
    .dropdown-menu.is-open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    @media (max-width: 768px) { .desktop-nav { display: none; } }
    .collection-card { transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
    .collection-card:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(0,0,0,0.6); }
    .collection-card .card-label { opacity: 0; transition: opacity 0.3s ease; }
    .collection-card:hover .card-label { opacity: 1; }
  </style>
</head>
<body class="bg-obsidian text-bone">

            </button>
            <div class="dropdown-menu absolute top-full left-0 mt-3 w-48 bg-charcoal border border-ash py-2 z-50">

              <div class="my-1.5 border-t border-ash"></div>
              <a href="all-collections.html" class="block px-5 py-2.5 text-[0.7rem] uppercase tracking-widest text-gold hover:bg-ash/30 transition-colors duration-150">All Collections</a>
            </div>
          </div>
          <div class="dropdown relative">
            <button class="nav-link text-bone text-[0.7rem] font-body uppercase tracking-widest hover:text-ivory transition-colors duration-200 flex items-center gap-1">
              Patterns
              <svg width="10" height="6" viewBox="0 0 10 6" fill="none" class="opacity-50"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
            <div class="dropdown-menu absolute top-full left-0 mt-3 w-52 bg-charcoal border border-ash py-2 z-50">

              <div class="my-1.5 border-t border-ash"></div>
              <a href="../account/account.html?tab=downloads" class="block px-5 py-2.5 text-[0.7rem] uppercase tracking-widest text-gold hover:bg-ash/30 transition-colors duration-150">Your Digital Downloads ↗</a>
            </div>
          </div>
        </nav>
        <a href="../index.html" class="absolute left-1/2 -translate-x-1/2 font-display text-ivory tracking-[0.3em] uppercase text-2xl md:text-3xl select-none hover:text-gold transition-colors duration-300">Kishimoto</a>
        <nav class="desktop-nav flex items-center gap-8 ml-auto">
          <a href="../admin/spreadsheet.html" class="nav-link text-bone text-[0.7rem] font-body uppercase tracking-widest hover:text-ivory transition-colors duration-200">The Spreadsheet</a>
          <a href="../index.html#about" class="nav-link text-bone text-[0.7rem] font-body uppercase tracking-widest hover:text-ivory transition-colors duration-200">About</a>
          <a href="../index.html#contact" class="nav-link text-bone text-[0.7rem] font-body uppercase tracking-widest hover:text-ivory transition-colors duration-200">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="pt-36 pb-28">
    <div class="max-w-[1440px] mx-auto px-6 md:px-16">

      <!-- Page heading -->

        <p class="font-mono text-smoke text-[0.65rem] uppercase tracking-widest mb-4">Kishimoto</p>
        <h1 class="font-display text-ivory font-light" style="font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1.05; letter-spacing: 0.01em;">All Collections</h1>
      </div>

      <!-- Collections grid -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">

        <a href="demon-corp.html" class="collection-card block relative overflow-hidden bg-charcoal" style="aspect-ratio: 3/4;">
          <img src="https://placehold.co/600x800/141414/2A2A2A?text=" alt="Demon Corp." class="w-full h-full object-cover" />
          <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.2) 60%, transparent 100%);"></div>
          <div class="absolute bottom-0 left-0 right-0 p-8">
            <p class="font-mono text-smoke text-[0.6rem] uppercase tracking-widest mb-2 card-label">Collection</p>
            <h2 class="font-display text-ivory text-3xl md:text-4xl font-light italic">Demon Corp.</h2>
            <div class="w-6 h-px bg-gold mt-4 card-label"></div>
          </div>
        </a>

        <a href="the-attack.html" class="collection-card block relative overflow-hidden bg-charcoal md:mt-12" style="aspect-ratio: 3/4;">
          <img src="https://placehold.co/600x800/141414/222?text=" alt="The Attack" class="w-full h-full object-cover" />
          <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.2) 60%, transparent 100%);"></div>
          <div class="absolute bottom-0 left-0 right-0 p-8">
            <p class="font-mono text-smoke text-[0.6rem] uppercase tracking-widest mb-2 card-label">Collection</p>
            <h2 class="font-display text-ivory text-3xl md:text-4xl font-light italic">The Attack</h2>
            <div class="w-6 h-px bg-gold mt-4 card-label"></div>
          </div>
        </a>

        <a href="hidden-village.html" class="collection-card block relative overflow-hidden bg-charcoal" style="aspect-ratio: 3/4;">
          <img src="https://placehold.co/600x800/141414/1a1a1a?text=" alt="Hidden Village" class="w-full h-full object-cover" />
          <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.2) 60%, transparent 100%);"></div>
          <div class="absolute bottom-0 left-0 right-0 p-8">
            <p class="font-mono text-smoke text-[0.6rem] uppercase tracking-widest mb-2 card-label">Collection</p>
            <h2 class="font-display text-ivory text-3xl md:text-4xl font-light italic">Hidden Village</h2>
            <div class="w-6 h-px bg-gold mt-4 card-label"></div>
          </div>
        </a>

      </div>

      <div class="mt-20 border-t border-ash pt-8 flex justify-between items-center">
        <a href="../index.html" class="font-mono text-smoke text-[0.65rem] uppercase tracking-widest hover:text-gold transition-colors duration-200">← Return Home</a>
        <p class="font-mono text-smoke text-[0.6rem] uppercase tracking-widest">3 Collections</p>
      </div>
    </div>
  </main>

  <script>
    document.querySelectorAll('.dropdown').forEach(dd => {
      const menu = dd.querySelector('.dropdown-menu')
      let closeTimer
      dd.addEventListener('mouseenter', () => { clearTimeout(closeTimer); menu.classList.add('is-open') })
      dd.addEventListener('mouseleave', () => { closeTimer = setTimeout(() => menu.classList.remove('is-open'), 150) })
    })
  </script>
</body>
</html>
